services:
  - type: web
    name: avishu-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app
      - key: PYTHON_VERSION
        value: "3.11"
